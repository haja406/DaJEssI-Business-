<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<style>
  html, body {
    margin: 0; height: 100%; display: flex; align-items: center; justify-content: center;
    background: linear-gradient(160deg, #1F4E3D 0%, #153629 100%);
    font-family: -apple-system, "Segoe UI", Arial, sans-serif;
    border-radius: 12px;
    overflow: hidden;
  }
  .wrap { text-align: center; color: white; }
  .logo {
    width: 56px; height: 56px; margin: 0 auto 14px; border-radius: 14px;
    background: #C9A227; display: flex; align-items: center; justify-content: center;
    font-size: 28px; font-weight: 700; color: #153629;
  }
  h1 { font-size: 18px; margin: 0 0 4px; font-weight: 600; letter-spacing: 0.3px; }
  p { font-size: 12px; margin: 0 0 18px; color: #cfe3d8; }
  .bar { width: 180px; height: 4px; background: rgba(255,255,255,0.15); border-radius: 4px; margin: 0 auto; overflow: hidden; }
  .bar::after {
    content: ""; display: block; width: 40%; height: 100%; background: #C9A227; border-radius: 4px;
    animation: slide 1.1s ease-in-out infinite;
  }
  @keyframes slide { 0% { margin-left: -40%; } 100% { margin-left: 100%; } }
</style>
</head>
<body>
  <div class="wrap">
    <div class="logo">D</div>
    <h1>DaJEssI Business</h1>
    <p>Démarrage de la base de données locale...</p>
    <div class="bar"></div>
  </div>
</body>
</html>
